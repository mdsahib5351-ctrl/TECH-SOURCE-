<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill View - TECH SOURCE</title>
  <link rel="stylesheet" href="css/billview.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
  <script src="script/billview.js" defer></script>
</head>
<body>
  <main class="page">
    <section class="invoice-container" id="invoice">
      <div class="outer-border">
        <div class="inner-border">
          <div class="header-banner">
            <img src="https://i.ibb.co/Z6gvXY4v/IMG-20260226-WA0004.webp" alt="TECH SOURCE">
          </div>

          <div class="bill" id="billDetails">Loading bill...</div>

          <div class="signature-section">
            <div class="payment-status-box">
              <div class="paid-stamp" id="paidStamp">
                <img src="https://i.ibb.co/234wtNnH/Screenshot-2026-03-18-06-07-02-56-removebg-preview.webp" alt="PAID">
              </div>
              <p id="gatewayText">Secure online payment by Cashfree</p>
            </div>

            <div class="sign-wrapper">
              <div class="imglogo">
                <img src="https://i.ibb.co/NdyWNrM1/Chat-GPT-Image-Mar-17-2026-11-03-14-AM.jpg" alt="Authorized signature">
              </div>
              <div class="qr-text">Authorized Signature</div>
            </div>
          </div>

          <button class="btn primary" id="payBtn" type="button">Pay Now</button>
        </div>
      </div>
    </section>

    <div class="actions">
      <button class="btn" type="button" onclick="downloadPDF()">Download PDF</button>
      <button class="btn" type="button" onclick="printBill()">Print Bill</button>
    </div>
  </main>
</body>
</html>
