<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill View - TECH SOURCE</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
.bill { max-width: 600px; background: #fff; padding: 20px; margin: auto; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
h2 { text-align: center; color: #4CAF50; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
th { background: #eee; }
.total { text-align: right; font-weight: bold; margin-top: 10px; }
.btn { display:inline-block;margin-top:15px;background:#4CAF50;color:#fff;padding:10px 20px;border:none;border-radius:40px;cursor:pointer; }
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="bill" id="billDetails">
<h2>TECH SOURCE SERVICES</h2>
</div>
<button class="btn" onclick="downloadPDF()">Download PDF</button>

<script>
// 🔹 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDZ-NvSzXJrH8YyvI5GWVWRtZnSNe0NAxU",
  authDomain: "tech-source-bill.firebaseapp.com",
  databaseURL: "https://tech-source-bill-default-rtdb.firebaseio.com",
  projectId: "tech-source-bill",
  storageBucket: "tech-source-bill.firebasestorage.app",
  messagingSenderId: "690209240188",
  appId: "1:690209240188:web:6e54de365e7f839634c5f9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const billDetails = document.getElementById('billDetails');
const urlParams = new URLSearchParams(window.location.search);

const billNo = urlParams.get('billNo'); // agar user / URL me billNo diya
const docId  = urlParams.get('id');     // agar admin panel doc.id se call karta

if(!billNo && !docId){
    billDetails.innerHTML += "<p>No Bill ID or Bill Number provided!</p>";
} else {

    let fetchPromise;

    if(docId){
        // Admin panel flow - doc.id ke against
        fetchPromise = db.collection("bills").doc(docId).get();
    } else {
        // User / URL flow - billNo ke against
        fetchPromise = db.collection("bills").where("billNo", "==", billNo).get();
    }

    fetchPromise.then(snapshot => {
        let data;

        if(docId){
            // doc.id
            if(!snapshot.exists){
                billDetails.innerHTML += "<p>Bill not found!</p>";
                return;
            }
            data = snapshot.data();
        } else {
            // billNo
            if(snapshot.empty){
                billDetails.innerHTML += "<p>Bill not found!</p>";
                return;
            }
            data = snapshot.docs[0].data();
        }

        // Services Table
        let servicesHTML = '';
        if(data.services){
            data.services.forEach(s => {
                servicesHTML += `<tr>
                    <td>${s.name}</td>
                    <td>${s.qty}</td>
                    <td>₹${s.price}</td>
                    <td>₹${s.qty * s.price}</td>
                </tr>`;
            });
        }

        billDetails.innerHTML += `
            <p><strong>Bill No:</strong> ${data.billNo}</p>
            <p><strong>Customer:</strong> ${data.customerName}</p>
            <p><strong>Mobile:</strong> ${data.customerMobile}</p>

            <table>
                <thead>
                    <tr><th>Service</th><th>Qty</th><th>Price</th><th>Total</th></tr>
                </thead>
                <tbody>${servicesHTML}</tbody>
            </table>

            <p class="total">Subtotal: ₹${data.subtotal || 0}</p>
            <p class="total">Discount: ₹${data.discount || 0}</p>
            <p class="total">Total: ₹${data.totalAmount || 0}</p>
            <p><strong>Payment Status:</strong> ${data.paymentStatus}</p>
            <p><strong>Payment Mode:</strong> ${data.paymentMode}</p>
            <p><strong>Date:</strong> ${data.date?.toDate ? data.date.toDate().toLocaleString() : new Date(data.date).toLocaleString()}</p>
        `;
    })
    .catch(err => {
        console.error(err);
        billDetails.innerHTML += "<p>Error fetching bill!</p>";
    });
}

// 🔹 PDF Download
async function downloadPDF(){
    const canvas = await html2canvas(billDetails);
    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    const imgProps = pdf.getImageProperties(imgData);
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = (imgProps.height * pdfWidth)/imgProps.width;
    pdf.addImage(imgData,'PNG',0,0,pdfWidth,pdfHeight);
    // Use whichever is available for filename
    const filename = docId ? `Bill_${docId}.pdf` : `Bill_${billNo}.pdf`;
    pdf.save(filename);
}
</script>
</body>
</html>
button{
padding:12px 20px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#43a047;
}

</style>
</head>

<body>

<div class="box">

<h2>Download Bill</h2>

<input 
type="text" 
id="searchBillNo" 
placeholder="Download by Bill Number (Example TS001)"
style="text-transform:uppercase"
oninput="this.value=this.value.toUpperCase()"
>

<input 
type="number" 
id="searchMobile" 
placeholder="Download by Mobile Number"
>

<button onclick="downloadBill()">Download Bill</button>

</div>

<script>

function downloadBill(){

let billNo = document.getElementById("searchBillNo").value.trim();
let mobile = document.getElementById("searchMobile").value.trim();

let allBills = JSON.parse(localStorage.getItem("allBills")) || [];

let billIndex = -1;

/* Bill Number Search */

if(billNo){

billIndex = allBills.findIndex(b => 
b.billNo.toLowerCase() === billNo.toLowerCase()
);

}

/* Mobile Number Search */

else if(mobile){

billIndex = allBills.findIndex(b => 
b.mobile === mobile
);

}

/* Nothing Entered */

else{

alert("Enter Bill Number OR Mobile Number");

return;

}

/* Bill Not Found */

if(billIndex === -1){

alert("Bill Not Found");

return;

}

/* Save index for next page */

localStorage.setItem("selectedBillIndex", billIndex);

/* Open bill page */

window.open("professionalbill.html","_blank");

}

</script>

</body>
</html>
