<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  text-align: center;
  padding: 20px;
}

.card {
  max-width: 420px;
  margin: auto;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 16px;
}

.amount {
  font-size: 28px;
  color: #00ffcc;
}

.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.pay { background: #00c853; color: white; }
.copy { background: #2196f3; color: white; }
.done { background: #ff9800; color: white; }

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

.status {
  margin-top: 10px;
  padding: 8px;
  border-radius: 6px;
  background: red;
}

.success {
  background: green !important;
}

img {
  width: 180px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="card">

<h2>PAN Payment</h2>

<p id="ackText"></p>

<div class="amount">₹190</div>

<button class="btn pay" onclick="payNow()">Pay via UPI</button>

<p>UPI: <b id="upi">7781826687@ybl</b></p>
<button class="btn copy" onclick="copyUPI()">Copy UPI</button>

<img id="qr">

<input type="text" id="txnId" placeholder="Enter Transaction ID">
<input type="file" id="screenshot">

<button class="btn done" onclick="submitPayment()">Submit Payment</button>

<div id="status" class="status">Status: Pending</div>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ✅ FIRESTORE IMPORT
import { 
  getFirestore, 
  collection, 
  query, 
  where, 
  getDocs, 
  updateDoc, 
  doc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDZ-NvSzXJrH8YyvI5GWVWRtZnSNe0NAxU",
  authDomain: "tech-source-bill.firebaseapp.com",
  databaseURL: "https://tech-source-bill-default-rtdb.firebaseio.com",
  projectId: "tech-source-bill",
  storageBucket: "tech-source-bill.firebasestorage.app",
  messagingSenderId: "690209240188",
  appId: "1:690209240188:web:6e54de365e7f839634c5f9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ✅ FIRESTORE INIT
const firestore = getFirestore(app);

// 🔹 GET ACK
const ack = new URLSearchParams(window.location.search).get("ack");
document.getElementById("ackText").innerText = "Ack No: " + ack;

// 🔹 UPI PAY
window.payNow = function () {
  const link = `upi://pay?pa=7781826687@ybl&pn=TechSource&am=190&cu=INR&tn=PAN-${ack}`;
  window.location.href = link;
};

// 🔹 COPY UPI
window.copyUPI = function () {
  navigator.clipboard.writeText("7781826687@ybl");
  alert("UPI Copied!");
};

// 🔹 QR GENERATE
document.getElementById("qr").src =
`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=7781826687@ybl&pn=TechSource&am=190&cu=INR&tn=PAN-${ack}`;

// 🔥 IMG BB UPLOAD
async function uploadToImgBB(file) {
  const apiKey = "fa4ad05090c8cc3f9ade673a64a52235";

  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (data.success) return data.data.url;
  else throw new Error("Image upload failed");
}

// 🔥 SUBMIT PAYMENT (FINAL)
window.submitPayment = async function () {
  const txn = document.getElementById("txnId").value;
  const file = document.getElementById("screenshot").files[0];

  if (!txn) return alert("Enter Transaction ID!");
  if (!file) return alert("Upload Screenshot!");

  try {
    alert("Uploading Screenshot...");

    const imageUrl = await uploadToImgBB(file);

    // 🔍 FIND APPLICATION
    const q = query(
      collection(firestore, "applications"),
      where("ackNo", "==", ack)
    );

    const snapshot = await getDocs(q);

    if (snapshot.empty) {
      alert("Application not found!");
      return;
    }

    // 🔥 UPDATE PAYMENT STATUS
    for (const docSnap of snapshot.docs) {
await updateDoc(doc(firestore, "applications", docSnap.id), {
  paymentStatus: "pending",   // 🔥 request only
  paymentRequest: true,
  txnId: txn,
  paymentScreenshot: imageUrl,
  paymentTime: new Date().toISOString()
});
    }
    alert("Payment Submitted Successfully ✅");

    document.getElementById("status").innerText = "Status: Paid";
    document.getElementById("status").classList.add("success");

  } catch (err) {
    alert("Error: " + err.message);
  }
};

</script>
</body>
</html>
